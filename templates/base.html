<!DOCTYPE html>
<html>
<head>
<title>Telecom</title>

<style>
body{
    display:flex;
    font-family:Arial;
    margin:0;
    background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#1e3c72;
    color:white;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
    border-radius:5px;
    margin-bottom:5px;
}

.sidebar a:hover{
    background:#2a5298;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#1e3c72;
    color:white;
}

/* BUTTONS */
.btn{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#1e3c72;
    color:white;
}

.btn-warning{
    background:#f39c12;
}

/* BADGES */
.badge-low{
    color:green;
    font-weight:bold;
}

.badge-medium{
    color:orange;
    font-weight:bold;
}

.badge-high{
    color:red;
    font-weight:bold;
}

/* FLASH ALERTS */
.alert{
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    font-weight:bold;
}

.alert-success{
    background:#d4edda;
    color:#155724;
}

.alert-danger{
    background:#f8d7da;
    color:#721c24;
}

.alert-warning{
    background:#fff3cd;
    color:#856404;
}

.alert-info{
    background:#d1ecf1;
    color:#0c5460;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>📊 Telecom</h2>
<a href="/dashboard">Dashboard</a>
<a href="/customers">Customers</a>
<a href="/logout">Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="alert alert-{{category}}">
      {{ message }}
    </div>
  {% endfor %}
{% endwith %}

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

</div>

</body>
</html>
