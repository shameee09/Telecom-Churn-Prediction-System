<!DOCTYPE html>
<html>
<head>
<title>Telecom</title>

<style>
body{display:flex;font-family:Arial;margin:0;background:#f4f6f9}

.sidebar{
    width:200px;
    background:#1e3c72;
    color:white;
    height:100vh;
    padding:15px
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none
}

.sidebar a:hover{background:#2a5298}

.content{flex:1;padding:20px}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

table{width:100%;border-collapse:collapse}

th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}

th{background:#1e3c72;color:white}

.btn{
    padding:6px 10px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    background:#1e3c72;
    color:white;
}

.btn-warning{background:#f39c12}

.badge-low{color:green;font-weight:bold}
.badge-medium{color:orange;font-weight:bold}
.badge-high{color:red;font-weight:bold}

</style>
</head>

<body>

<div class="sidebar">
<a href="/dashboard">Dashboard</a>
<a href="/customers">Customers</a>
<a href="/logout">Logout</a>
</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
