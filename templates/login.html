<!DOCTYPE html>
<html>
<head>
<title>Telecom churn - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#04337a;
}

.container{
width:380px;
}

.card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.logo{
text-align:center;
font-size:26px;
margin-bottom:25px;
color:#1e3c72;
font-weight:bold;
}

.logo i{
margin-right:8px;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
font-size:14px;
margin-bottom:5px;
color:#333;
}

.input-group input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
}

.input-group input:focus{
border-color:#1e3c72;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16335c;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#1e3c72;
text-decoration:none;
font-weight:bold;
}

.link a:hover{
text-decoration:underline;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<div class="logo">
<i class="fa-solid fa-signal"></i> Telecom Churn
</div>

<form method="POST">

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i> Login
</button>

</form>

<div class="link">
<a href="/register">Create Account</a>
</div>

</div>
</div>

</body>
</html>
